# Frozen experiment configuration for TMLR reproducibility study
# DO NOT MODIFY after experiments begin.
# All parameters here define the exact conditions for reproduction.

study:
  title: "Revisiting AlphaEdit: Sequential Knowledge Editing Under Paraphrase, Conflict, and Temporal Drift"
  target_venue: "TMLR (Reproducibility Certification)"
  mlrc_nomination: "NeurIPS 2026 MLRC track"
  tmlr_submission_target: "2026-07-24"
  alphaedit_commit: "b84624f44dfe8fc6cd9e41df916c44124a0c46dc"
  alphaedit_repo: "https://github.com/jianghoucheng/AlphaEdit"

models:
  primary:
    name: "meta-llama/Meta-Llama-3-8B-Instruct"
    hparams_fname: "Llama3-8B.json"
    notes: >
      Original paper's primary model. Requires HF access approval.
      Set MODEL_NAME=NousResearch/Meta-Llama-3-8B-Instruct in .env
      to use the ungated equivalent without approval.
  secondary:
    name: "mistralai/Mistral-7B-Instruct-v0.3"
    hparams_fname: "Mistral-7B.json"
    notes: >
      Same Llama-style architecture (model.layers.{}.mlp.down_proj), different
      training data and tokenizer. Tests generalizability across LLMs.
      Freely available on HuggingFace (no gated access).
      Covariance stats computed on first run (~30 min).
  fallback:
    name: "EleutherAI/gpt-j-6b"
    hparams_fname: "EleutherAI_gpt-j-6B.json"
    notes: >
      Different architecture family (GPT vs Llama). Official hparams
      already in repo. Use if Mistral-7B proves incompatible.

seeds:
  default: [42, 137, 2024, 7, 99]
  notes: >
    5 seeds provide stable inter-seed variance estimation. All primary
    comparisons (AlphaEdit vs MEMIT) are run across all 5 seeds. The
    failure curve and capability probe also use all 5 seeds to produce
    error bars across runs.

# Minimal Viable Experiment set (must complete for submission)
experiments:
  mve1_alphaedit_mcf:
    description: "Official reproduction of AlphaEdit on MultiCounterFact"
    alg_name: "AlphaEdit"
    ds_name: "mcf"
    dataset_size_limit: 2000
    num_edits: 100
    downstream_eval_steps: 5
    skip_generation_tests: false
    generation_test_interval: 1
    conserve_memory: true
    success_criterion: >
      AlphaEdit directionally matches original paper's claim against MEMIT
      on Efficacy/Generalization while preserving competitive
      Specificity/Fluency/Consistency.

  mve2_memit_mcf:
    description: "Matched MEMIT baseline on MultiCounterFact"
    alg_name: "MEMIT"
    ds_name: "mcf"
    dataset_size_limit: 2000
    num_edits: 100
    downstream_eval_steps: 5
    skip_generation_tests: false
    generation_test_interval: 1
    conserve_memory: true
    success_criterion: >
      Fair comparison baseline. Same model, dataset, edit count,
      batch size, evaluation cadence, and hardware tier.

  mve3_alphaedit_zsre:
    description: "Official reproduction of AlphaEdit on zsRE"
    alg_name: "AlphaEdit"
    ds_name: "zsre"
    dataset_size_limit: 2000
    num_edits: 100
    downstream_eval_steps: 5
    skip_generation_tests: false
    generation_test_interval: 1
    conserve_memory: true
    success_criterion: >
      Confirms AlphaEdit advantage is not CounterFact-only.

  mve4_conflict_seq:
    description: "Conflict sequence stress test (added value for TMLR certification)"
    alg_name: "AlphaEdit"
    ds_name: "mcf"
    dataset_size_limit: 200
    num_edits: 1
    downstream_eval_steps: 0
    skip_generation_tests: false
    generation_test_interval: 1
    conserve_memory: true
    custom_dataset: true
    success_criterion: >
      Demonstrates where AlphaEdit's preservation advantage is stable
      under conflicting sequential updates, and where it degrades.

# Calibration baseline (validates evaluation harness correctness)
calibration_experiments:
  rome_baseline:
    description: >
      ROME (Rank-One Model Editing) as a calibration baseline. ROME edits
      one fact at a time and should perform significantly worse than both
      MEMIT and AlphaEdit on sequential editing. If it does not, the
      evaluation harness has a systematic error. Also provides a lower-bound
      reference point for the comparison figures.
    alg_name: "ROME"
    ds_name: "mcf"
    dataset_size_limit: 2000
    num_edits: 1
    downstream_eval_steps: 5
    conserve_memory: true
    success_criterion: >
      ROME performs worse than MEMIT on all metrics (especially generalization
      and specificity), confirming the evaluation harness is correctly
      calibrated and that the sequential editing advantage of MEMIT/AlphaEdit
      is genuine.

# High-priority extensions (run after MVE; critical for acceptance)
high_priority_experiments:
  failure_curve_alphaedit:
    description: >
      Failure characterization curve: measure preservation metrics as a function
      of total edit count. Identifies the crossover point where AlphaEdit's
      advantage over MEMIT disappears. This gives the community actionable
      guidance on operational limits. Extended to 10,000 edits to match the
      original paper's maximum scale.
    alg_name: "AlphaEdit"
    ds_name: "mcf"
    edit_counts: [500, 1000, 1500, 2000, 3000, 5000, 7500, 10000]
    num_edits: 100
    downstream_eval_steps: 5
    skip_generation_tests: false
    conserve_memory: true
    success_criterion: >
      Produces a clear curve showing how Efficacy, Generalization, and
      Specificity degrade as edit count increases. Identifies whether
      there is a crossover point where the null-space constraint stops
      helping relative to MEMIT.

  failure_curve_memit:
    description: "Matched MEMIT failure curve for comparison"
    alg_name: "MEMIT"
    ds_name: "mcf"
    edit_counts: [500, 1000, 1500, 2000, 3000, 5000, 7500, 10000]
    num_edits: 100
    downstream_eval_steps: 5
    skip_generation_tests: false
    conserve_memory: true
    success_criterion: >
      Paired comparison against AlphaEdit at each edit count level.

  second_model_alphaedit:
    description: >
      Reproduce AlphaEdit on Mistral-7B-Instruct to demonstrate that
      findings generalize beyond the single model tested in the original paper.
    model_name: "mistralai/Mistral-7B-Instruct-v0.3"
    hparams_fname: "Mistral-7B.json"
    alg_name: "AlphaEdit"
    ds_name: "mcf"
    dataset_size_limit: 2000
    num_edits: 100
    downstream_eval_steps: 5
    conserve_memory: true
    success_criterion: >
      AlphaEdit shows a consistent directional advantage over MEMIT on
      Mistral-7B, confirming the method generalizes across LLMs.

  second_model_memit:
    description: "MEMIT baseline on Mistral-7B for comparison"
    model_name: "mistralai/Mistral-7B-Instruct-v0.3"
    hparams_fname: "Mistral-7B.json"
    alg_name: "MEMIT"
    ds_name: "mcf"
    dataset_size_limit: 2000
    num_edits: 100
    downstream_eval_steps: 5
    conserve_memory: true
    success_criterion: >
      Establishes the MEMIT baseline on the second model.

  capability_probe:
    description: >
      General capability preservation measurement. Computes perplexity on
      WikiText-103 test set (200 passages, 512-token window) at each
      downstream evaluation step during editing. Shows whether the edited
      model retains its general language modeling capabilities or degrades.
      Run for both AlphaEdit and MEMIT to compare preservation.
    alg_name: "both"
    ds_name: "mcf"
    dataset_size_limit: 2000
    num_edits: 100
    probe_interval: 5
    metrics_measured: ["perplexity_wikitext103"]
    success_criterion: >
      Produces a clear timeseries showing perplexity vs edit count for
      both methods. If AlphaEdit's null-space constraint genuinely
      preserves unrelated knowledge, its perplexity should remain closer
      to the unedited baseline than MEMIT's.

  nullspace_rank_consumption:
    description: >
      Mechanistic analysis: tracks how the null-space is consumed as
      sequential edits accumulate. Records the rank of the accumulated
      covariance cache (cache_c) relative to the initial null-space
      dimensions at each layer. Produces figures showing:
      (a) rank growth curves per layer,
      (b) consumption ratio timeline approaching saturation,
      (c) per-layer heatmap revealing which layers saturate first,
      (d) spectral decay of cache_c singular values.
      This provides the mechanistic explanation for why AlphaEdit
      eventually degrades, complementing the failure characterization curve.
    alg_name: "AlphaEdit"
    model_name: "meta-llama/Meta-Llama-3-8B-Instruct"
    hparams_fname: "Llama3-8B.json"
    ds_name: "mcf"
    dataset_size_limit: 2000
    num_edits: 100
    downstream_eval_steps: 5
    conserve_memory: true
    success_criterion: >
      Demonstrates a clear relationship between consumption ratio
      and metric degradation. Identifies which layers saturate first.
      Estimates the operational edit count limit for practitioners.

  cache_mitigation_sweep:
    description: >
      Tests 3 simple mitigations for null-space saturation:
      (1) SVD truncation of cache_c every K batches (keep top-r SVs),
      (2) Exponential decay (cache_c *= factor each batch),
      (3) Periodic full reset of cache_c every K batches.
      Identifies whether simple interventions can extend AlphaEdit's
      operational range beyond its natural saturation point.
    alg_name: "AlphaEdit"
    ds_name: "mcf"
    dataset_size_limit: 2000
    num_edits: 100
    downstream_eval_steps: 5
    conserve_memory: true
    variants:
      svd_truncation: {intervals: [5, 10], retain_ratios: [0.5, 0.75, 0.9]}
      exponential_decay: {decay_factors: [0.90, 0.95, 0.99]}
      periodic_reset: {intervals: [5, 10, 20]}
    success_criterion: >
      At least one mitigation strategy maintains efficacy/generalization
      while improving specificity at high edit counts (>1000 edits).
      Even negative results are publishable if they demonstrate that
      simple cache management is insufficient to overcome saturation.

  edit_order_sensitivity:
    description: >
      Tests whether edit ordering affects AlphaEdit's final performance.
      Runs the same 2000 MCF edits in 10 random orderings and compares
      metric variance between AlphaEdit (sequential null-space) and
      MEMIT (no null-space constraint). Hypothesis: AlphaEdit is
      significantly more order-sensitive because early edits claim
      null-space directions first, constraining later edits.
    alg_name: "both"
    ds_name: "mcf"
    dataset_size_limit: 2000
    num_edits: 100
    downstream_eval_steps: 5
    conserve_memory: true
    num_orderings: 10
    statistical_test: "Levene's test for equality of variances"
    success_criterion: >
      Demonstrates statistically significant difference in order
      sensitivity between AlphaEdit and MEMIT (Levene's test p<0.05),
      or shows that ordering has negligible effect (also publishable
      as a negative finding confirming robustness).

  semantic_coupling_stress:
    description: >
      Tests whether semantic coupling between edits causes the null-space
      projection to strip edit content. Measures projection loss (fraction
      of desired update removed by P) as a function of coupling type:
      unrelated, relation_match, subject_match, full_conflict. This tests
      the core assumption of AlphaEdit: that editability and preservation
      directions are always separable. Uses per-edit, per-layer measurement
      of projection residuals inside apply_AlphaEdit_to_model.
    alg_name: "AlphaEdit"
    ds_name: "mcf"
    dataset_size_limit: 500
    num_edits: 1
    downstream_eval_steps: 0
    conserve_memory: true
    custom_dataset: true
    coupling_types: ["unrelated", "relation_match", "subject_match", "full_conflict"]
    pairs_per_type: 60
    warmup_edits: 20
    statistical_tests:
      - "Kruskal-Wallis H-test across coupling types"
      - "Pairwise Mann-Whitney U with Holm-Bonferroni correction"
      - "Cliff's delta (full_conflict vs unrelated)"
      - "Spearman correlation: projection_loss vs upd_matrix_norm"
    success_criterion: >
      Demonstrates statistically significant increase in projection loss
      for high-coupling edits (Type 2, 3) compared to unrelated edits (Type 0).
      Provides mechanistic evidence that AlphaEdit's core assumption can fail
      when edits are semantically related to preserved knowledge. Even a null
      result (no difference across types) is publishable as it would validate
      the separability assumption.

# Expanded experiments (run after MVE + high-priority are complete)
expanded_experiments:
  paraphrase_robustness:
    description: "Stratify generalization by lexical distance bucket"
    alg_name: "AlphaEdit"
    ds_name: "mcf"
    dataset_size_limit: 2000
    num_edits: 100
    downstream_eval_steps: 0
    notes: >
      Use CounterFact/zsRE paraphrase prompts tied to Generalization;
      stratify by lexical distance and compare AlphaEdit vs MEMIT.

  temporal_drift:
    description: "MQuAKE-t style temporal edits in chronological order"
    alg_name: "AlphaEdit"
    ds_name: "mcf"
    dataset_size_limit: 200
    num_edits: 1
    downstream_eval_steps: 0
    notes: >
      Build a small dated fact set from MQuAKE-t style temporal edits
      and KnowEdit wiki_recent; edit in chronological and reverse order.

# Hardware requirements
hardware:
  minimum: "1x A40 48GB"
  recommended: "1x A100 80GB or RTX PRO Blackwell 6000 96GB"
  notes: >
    All experiments reported in the original paper used a single A40 48GB GPU.
    Larger GPUs reduce risk of OOM with conserve_memory=false.
